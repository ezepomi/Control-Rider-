<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Financiero</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, getDocs, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGUD-PIo2zFBkiFqfkN0Fpaqqp5_jNInw",
            authDomain: "control-financiero-rider.firebaseapp.com",
            projectId: "control-financiero-rider",
            storageBucket: "control-financiero-rider.firebasestorage.app",
            messagingSenderId: "952661224242",
            appId: "1:952661224242:web:3640495af6d4719c33052b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'control-rider-eze';

        window.handleLogin = async () => {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithPopup(auth, provider);
            } catch (err) { alert("Error al conectar con Google."); console.error(err); }
        };

        window.handleLogout = () => {
            if(confirm("¿Cerrar sesión de forma segura?")) {
                signOut(auth).then(() => { localStorage.clear(); location.reload(); });
            }
        };

        onAuthStateChanged(auth, (u) => {
            window.user = u;
            document.getElementById('view-loading').classList.add('hidden');
            if (u) {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('display-user').innerText = "Hola, " + u.displayName.split(' ')[0];
                window.updateCountdown();
                window.fetchData();
            } else {
                document.getElementById('view-login').classList.remove('hidden');
                document.getElementById('view-app').classList.add('hidden');
            }
        });

        // LÓGICA DE FECHAS PE-YA
        // Ganancias: Lunes a Domingo -> Paga el Jueves
        // Efectivo: Miércoles a Martes -> Se descuenta ese mismo Jueves
        window.getPeYaDates = (dateStr) => {
            const [y, m, d] = dateStr.split('-').map(Number);
            const dateObj = new Date(y, m - 1, d);
            const day = dateObj.getDay(); // 0=Sun, 1=Mon...

            // Calcular Jueves de Ganancias (Cierre Domingo)
            const distToSun = (7 - day) % 7; 
            const sunEarn = new Date(dateObj);
            sunEarn.setDate(dateObj.getDate() + distToSun);
            const payE = new Date(sunEarn);
            payE.setDate(sunEarn.getDate() + 4); 

            // Calcular Jueves de Efectivo (Cierre Martes)
            const distToTue = (2 - day + 7) % 7;
            const tueCash = new Date(dateObj);
            tueCash.setDate(dateObj.getDate() + distToTue);
            const payC = new Date(tueCash);
            payC.setDate(tueCash.getDate() + 2); 

            const fmt = (dt) => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
            return { payDateE: fmt(payE), payDateC: fmt(payC) };
        };

        window.fetchData = async () => {
            if(!window.user) return;
            
            const refJornadas = collection(db, 'artifacts', APP_ID, 'users', window.user.uid, 'jornadas');
            const snapJornadas = await getDocs(query(refJornadas, orderBy('date', 'desc')));
            window.records = snapJornadas.docs.map(d => {
                const data = d.data();
                const peyaDates = window.getPeYaDates(data.date);
                return { id: d.id, ...data, peyaEarn: peyaDates.payDateE, peyaCash: peyaDates.payDateC };
            });
            
            const refMetas = collection(db, 'artifacts', APP_ID, 'users', window.user.uid, 'metas');
            const snapMetas = await getDocs(refMetas);
            window.metas = {};
            snapMetas.docs.forEach(d => { window.metas[d.id] = d.data(); });

            window.renderHistory(); 
            window.renderCobros();
            window.renderBalances();
            window.renderGoalWidget();
        };

        window.saveToFirebase = async (data, id = null) => {
            const ref = collection(db, 'artifacts', APP_ID, 'users', window.user.uid, 'jornadas');
            if(id) await updateDoc(doc(db, 'artifacts', APP_ID, 'users', window.user.uid, 'jornadas', id), {...data, updatedAt: serverTimestamp()});
            else await addDoc(ref, {...data, createdAt: serverTimestamp()});
            window.fetchData();
        };

        window.deleteFromFirebase = async (id) => {
            await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', window.user.uid, 'jornadas', id));
            window.fetchData();
        };

        window.saveGoal = async () => {
            const name = document.getElementById('goal-name-input').value || 'Objetivo Mensual';
            const amount = parseFloat(document.getElementById('goal-amount-input').value) || 0;
            const now = new Date();
            const key = `${now.getFullYear()}-${now.getMonth()}`;
            
            const metaRef = doc(db, 'artifacts', APP_ID, 'users', window.user.uid, 'metas', key);
            await setDoc(metaRef, { name, amount, updatedAt: serverTimestamp() });
            
            window.toggleGoalForm(); window.fetchData(); 
        };
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --n-cyan: #00f3ff; --n-green: #39ff14; --n-red: #ff3131; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; touch-action: pan-y; }
        .card { background: rgba(18, 18, 18, 0.98); border-radius: 24px; padding: 1.5rem; border: 1px solid #222; }
        input { background: #111 !important; border: 1px solid #2a2a2a !important; color: var(--n-cyan) !important; text-align: center; height: 55px; border-radius: 16px; width: 100%; font-weight: 700; outline: none; font-size: 1.1rem; }
        input:focus { border-color: var(--n-cyan) !important; }
        .btn-main { font-weight: 900; display: flex; align-items: center; justify-content: center; text-transform: uppercase; border-radius: 18px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }
        .tab-btn { padding: 16px 0; font-weight: 900; font-size: 10px; text-transform: uppercase; color: #444; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--n-cyan); border-bottom: 2px solid var(--n-cyan); }
        .hidden { display: none !important; }
        .loading-spinner { border: 3px solid rgba(0, 243, 255, 0.1); border-top: 3px solid var(--n-cyan); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .circle-progress { transition: stroke-dashoffset 1s ease-out, stroke 0.5s ease; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col bg-black">

    <div id="view-loading" class="flex-1 flex flex-col items-center justify-center p-10 text-center">
        <div class="loading-spinner mb-4"></div>
        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-zinc-500">Iniciando...</p>
    </div>

    </div>

    <div id="view-app" class="hidden flex-1 flex flex-col">
        <header class="sticky top-0 bg-black/95 backdrop-blur-xl z-50 pt-8 pb-2 px-4 border-b border-zinc-900">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 id="display-user" class="font-black text-sm uppercase text-white italic">Rider</h2>
                    <p id="mundial-countdown" class="text-[9px] text-cyan-400 font-black uppercase tracking-wider mt-1 italic"></p>
                </div>
                <button onclick="handleLogout()" class="text-[9px] font-black text-zinc-500 uppercase border border-zinc-800 px-4 py-2 rounded-xl">Salir</button>
            </div>
            <nav class="flex">
                <button onclick="changeTab('registro')" id="btn-registro" class="tab-btn flex-1 active">Diario</button>
                <button onclick="changeTab('historial')" id="btn-historial" class="tab-btn flex-1">Rutas</button>
                <button onclick="changeTab('cobros')" id="btn-cobros" class="tab-btn flex-1">Cobros</button>
                <button onclick="changeTab('balances')" id="btn-balances" class="tab-btn flex-1">Metas</button>
            </nav>
        </header>

        <main class="flex-1 pb-44 overflow-x-hidden">
            
            <!-- PESTAÑA DIARIO (REGISTRO) -->
            <div id="tab-registro" class="p-5 space-y-5">
                <div id="edit-indicator" class="hidden bg-yellow-500/10 border border-yellow-500/30 p-3 rounded-xl text-center">
                    <p class="text-[10px] font-black text-yellow-500 uppercase italic">Modo Edición Activado</p>
                    <button onclick="cancelEdit()" class="text-[9px] text-white underline font-bold">Cancelar Edición</button>
                </div>
                
                <div class="card"><input type="date" id="form-date"></div>
                
                <div class="card border-cyan-900/30">
                    <p class="text-[10px] font-black text-cyan-400 uppercase mb-4 text-center tracking-widest italic">Liquidación App</p>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div><label class="text-[8px] text-zinc-600 block mb-1 uppercase font-bold text-center">Base</label><input type="number" inputmode="decimal" id="form-base" placeholder="0"></div>
                        <div><label class="text-[8px] text-zinc-600 block mb-1 uppercase font-bold text-center">Propinas App</label><input type="number" inputmode="decimal" id="form-online" placeholder="0"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[8px] text-zinc-600 block mb-1 uppercase font-bold text-center">Logros</label><input type="number" inputmode="decimal" id="form-logros" placeholder="0"></div>
                        <div><label class="text-[8px] text-zinc-600 block mb-1 uppercase font-bold text-center">Bono Grupo</label><input type="number" inputmode="decimal" id="form-grupo" placeholder="0"></div>
                    </div>
                </div>

                <div class="card border-yellow-900/30">
                    <p class="text-[10px] font-black text-yellow-500 uppercase mb-2 text-center">Adelantos en Efectivo</p>
                    <input type="number" inputmode="decimal" id="form-collected" class="!text-yellow-500" placeholder="Dinero rendido">
                </div>

                <div class="card border-green-900/30 bg-green-500/[0.02]">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-green-500 uppercase">Propinas Mano</span>
                        <span id="display-tip-total" class="text-3xl font-black text-green-400">$0</span>
                    </div>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <button onclick="addTip(200)" class="h-12 rounded-xl bg-zinc-900 text-green-400 border border-zinc-800 text-[10px] font-black">+$200</button>
                        <button onclick="addTip(500)" class="h-12 rounded-xl bg-zinc-900 text-green-400 border border-zinc-800 text-[10px] font-black">+$500</button>
                        <button onclick="addTip(1000)" class="h-12 rounded-xl bg-zinc-900 text-green-400 border border-zinc-800 text-[10px] font-black">+$1k</button>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <input type="number" inputmode="decimal" id="form-tip-manual" placeholder="Monto" class="flex-1 !text-left px-4 !text-green-400 h-[45px]">

                    </div>
                    <div id="tips-log" class="max-h-32 overflow-y-auto space-y-1"></div>
                </div>

                <div class="card border-red-900/30">
                    <p class="text-[10px] font-black text-red-500 uppercase mb-2 text-center">Gasto Nafta</p>
                    <input type="number" inputmode="decimal" id="form-gas" class="!text-red-500" placeholder="0">
                </div>
            </div>

            <!-- PESTAÑA RUTAS (HISTORIAL) -->
            <div id="tab-historial" class="p-5 hidden space-y-4">
                <h3 class="text-center text-[10px] font-black uppercase mb-4 italic text-zinc-600 tracking-widest">Rutas Realizadas</h3>
                <div id="history-list" class="space-y-4"></div>
            </div>

            <!-- PESTAÑA COBROS (NUEVO) -->
            <div id="tab-cobros" class="p-5 hidden space-y-4">
                <div id="next-payment-widget"></div>
                <h3 class="text-center text-[10px] font-black uppercase my-6 italic text-zinc-600 tracking-widest">Historial de Depósitos</h3>
                <div id="payments-list" class="space-y-4"></div>
            </div>

            <!-- PESTAÑA METAS (BALANCES) -->
            <div id="tab-balances" class="p-5 hidden space-y-5">
                <div id="goal-widget" class="card border-cyan-500/30 bg-cyan-900/10">
                    <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                        <h3 id="goal-title" class="text-[11px] font-black uppercase text-cyan-400 tracking-widest">OBJETIVO MENSUAL</h3>
                        <button onclick="toggleGoalForm()" class="text-[9px] bg-zinc-900 px-3 py-1 rounded-xl text-cyan-400 font-black uppercase">Editar</button>
                    </div>
                    <div id="goal-form" class="hidden mb-6 p-4 bg-black/60 rounded-xl border border-zinc-800">
                        <input type="text" id="goal-name-input" placeholder="Nombre (Ej: Alquiler, Ahorro)" class="mb-3 !h-12 !text-sm !text-white">
                        <input type="number" inputmode="decimal" id="goal-amount-input" placeholder="Monto Meta ($)" class="mb-3 !h-12 !text-sm">

                    </div>
                    <div class="flex items-center justify-between gap-4">
                        <div class="relative w-24 h-24 flex-shrink-0">
                            <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="40" fill="transparent" stroke="#222" stroke-width="8"></circle>
                                <circle id="goal-circle" class="circle-progress" cx="50" cy="50" r="40" fill="transparent" stroke="#00f3ff" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round"></circle>
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span id="goal-percentage" class="text-xl font-black text-white">0%</span>
                            </div>
                        </div>
                        <div class="flex-1 text-right">
                            <p class="text-[8px] text-zinc-500 font-black uppercase mb-1">Progreso Neto Actual</p>
                            <p id="goal-current" class="text-2xl font-black text-white">$0</p>
                            <p class="text-[9px] text-zinc-500 font-black uppercase mt-1">De <span id="goal-target" class="text-cyan-400">$0</span></p>
                        </div>
                    </div>
                </div>
                <div id="balances-list" class="space-y-4"></div>
            </div>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-5 bg-black/95 backdrop-blur-2xl border-t border-zinc-900 max-w-md mx-auto z-40 flex gap-3">
            <button onclick="saveRecord()" id="btn-save" class="flex-[3] h-16 btn-main bg-white text-black text-[11px] font-black shadow-[0_0_20px_rgba(255,255,255,0.1)]">Guardar Jornada</button>
            <button onclick="exportExcel()" class="flex-[2] h-16 btn-main border border-green-500 text-green-500 text-[9px] text-center leading-tight">Exportar a<br>Excel</button>
        </div>
    </div>

    <script>
        window.records = []; window.metas = {}; window.dailyTips = []; window.editingId = null; window.currentTab = 'registro';

        // SWIPE 4 TABS
        let touchstartX = 0;
        window.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
        window.addEventListener('touchend', e => { 
            const diff = touchstartX - e.changedTouches[0].screenX;
            const tabs = ['registro', 'historial', 'cobros', 'balances'];
            const idx = tabs.indexOf(window.currentTab);
            if (Math.abs(diff) > 80) {
                if (diff > 0 && idx < 3) window.changeTab(tabs[idx+1]);
                if (diff < 0 && idx > 0) window.changeTab(tabs[idx-1]);
            }
        });

        window.updateCountdown = () => {
            const m = new Date('2026-06-11T00:00:00');
            const d = Math.ceil((m - new Date()) / 864e5);
            document.getElementById('mundial-countdown').innerText = `FALTAN ${d} DIAS PARA EL MUNDIAL 🇦🇷`;
        };

        window.addTip = (v) => { window.dailyTips.push({id: Date.now(), amount: v, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}); window.updateTipUI(); };
        window.addManualTip = () => { const el = document.getElementById('form-tip-manual'); const v = parseFloat(el.value); if(v > 0) { window.addTip(v); el.value = ''; } };
        window.updateTipUI = () => {
            document.getElementById('display-tip-total').innerText = `$${window.dailyTips.reduce((s, c) => s + c.amount, 0).toLocaleString()}`;
            const list = document.getElementById('tips-log'); list.innerHTML = '';
            [...window.dailyTips].reverse().forEach(t => {
                list.innerHTML += `<div class="flex justify-between items-center text-[10px] p-2 bg-white/5 rounded-lg mb-1"><span>${t.time} — <b>$${t.amount}</b></span><button onclick="removeTip(${t.id})" class="text-red-500 font-black">X</button></div>`;
            });
        };
        window.removeTip = (id) => { window.dailyTips = window.dailyTips.filter(t => t.id !== id); window.updateTipUI(); };

        window.saveRecord = async () => {
            const date = document.getElementById('form-date').value;
            if(!date) return alert("Elegí una fecha");
            const btn = document.getElementById('btn-save'); btn.disabled = true; btn.innerText = "Guardando...";
            const d = new Date(date + 'T12:00:00');
            const data = {
                date, month: d.getMonth(), year: d.getFullYear(), week: window.getWeekNumber(d),
                base: parseFloat(document.getElementById('form-base').value) || 0,
                online: parseFloat(document.getElementById('form-online').value) || 0,
                logros: parseFloat(document.getElementById('form-logros').value) || 0,
                grupo: parseFloat(document.getElementById('form-grupo').value) || 0,
                collected: parseFloat(document.getElementById('form-collected').value) || 0,
                gas: parseFloat(document.getElementById('form-gas').value) || 0,
                propinasMano: window.dailyTips.reduce((s, c) => s + c.amount, 0),
                tipsDetail: window.dailyTips
            };
            try { await window.saveToFirebase(data, window.editingId); window.cancelEdit(); } 
            catch (e) { alert("Error al guardar"); }
            btn.disabled = false; btn.innerText = "Guardar Jornada";
        };

        window.editRecord = (id) => {
            const r = window.records.find(x => x.id === id); if(!r) return;
            window.editingId = id; document.getElementById('form-date').value = r.date;
            ['base','online','logros','grupo','collected','gas'].forEach(k => document.getElementById('form-'+k).value = r[k] || '');
            window.dailyTips = r.tipsDetail || []; window.updateTipUI();
            document.getElementById('edit-indicator').classList.remove('hidden');
            document.getElementById('btn-save').innerText = "Actualizar Jornada";
            window.changeTab('registro');
        };

        window.deleteRecord = async (id) => { if(confirm("¿Borrar jornada permanentemente?")) await window.deleteFromFirebase(id); };
        window.cancelEdit = () => { window.editingId = null; ['base','online','logros','grupo','collected','gas'].forEach(k => document.getElementById('form-'+k).value = ''); window.dailyTips = []; window.updateTipUI(); document.getElementById('edit-indicator').classList.add('hidden'); document.getElementById('btn-save').innerText = "Guardar Jornada"; };
        window.changeTab = (t) => { window.currentTab = t; ['registro','historial','cobros','balances'].forEach(v => { document.getElementById('tab-'+v).classList.add('hidden'); document.getElementById('btn-'+v).classList.remove('active'); }); document.getElementById('tab-'+t).classList.remove('hidden'); document.getElementById('btn-'+t).classList.add('active'); window.scrollTo(0,0); };
        window.getWeekNumber = (d) => { d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7)); return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 864e5) + 1) / 7); };

        // TAB RUTAS
        window.renderHistory = () => {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            window.records.forEach(r => {
                const net = (r.base + r.online + r.logros + r.grupo + r.propinasMano) - r.gas;
                const nomD = dias[new Date(r.date + 'T12:00:00').getDay()];
                list.innerHTML += `
                    <div class="card border-l-4 border-cyan-500 bg-zinc-950/40">
                        <div class="flex justify-between items-start">
                            <div><p class="text-[8px] text-zinc-600 font-black uppercase">${nomD} ${r.date.split('-').reverse().slice(0,2).join('/')}</p><p class="text-xl font-black">$${Math.round(net).toLocaleString()} <span class="text-[9px] text-zinc-700 italic">NETO</span></p></div>
                            <div class="flex gap-2">
                                <button onclick="editRecord('${r.id}')" class="bg-zinc-900 px-3 py-2 rounded-xl text-cyan-400 text-[9px] font-black uppercase">Edit</button>
                                <button onclick="deleteRecord('${r.id}')" class="bg-zinc-900 px-3 py-2 rounded-xl text-red-500 text-[9px] font-black uppercase">X</button>
                            </div>
                        </div>
                    </div>`;
            });
        };

        // TAB COBROS (LÓGICA PE-YA)
        window.renderCobros = () => {
            const pDates = [...new Set(window.records.flatMap(r => [r.peyaEarn, r.peyaCash]))].sort().reverse();
            const wNext = document.getElementById('next-payment-widget'); wNext.innerHTML = '';
            const list = document.getElementById('payments-list'); list.innerHTML = '';
            
            if(pDates.length === 0) return;

            // Encontrar el pago más próximo (mayor o igual a hoy, o el último registrado)
            const hoyStr = new Date().toISOString().split('T')[0];
            let nextP = pDates.find(d => d >= hoyStr) || pDates[0];

            pDates.forEach(pd => {
                const earnRecs = window.records.filter(r => r.peyaEarn === pd);
                const cashRecs = window.records.filter(r => r.peyaCash === pd);
                
                const totEarn = earnRecs.reduce((s,r) => s + r.base + r.online + r.logros + r.grupo, 0);
                const totCash = cashRecs.reduce((s,r) => s + r.collected, 0);
                const aCobrar = totEarn - totCash;

                const fmtDate = pd.split('-').reverse().slice(0,2).join('/');
                
                if(pd === nextP) {
                    wNext.innerHTML = `
                    <div class="card border border-cyan-500/50 bg-cyan-500/[0.05] shadow-[0_0_20px_rgba(0,243,255,0.1)]">
                        <div class="flex justify-between items-center mb-5 border-b border-cyan-900/30 pb-3">
                            <span class="text-[11px] font-black text-cyan-400 uppercase tracking-widest italic">PRÓXIMO COBRO</span>
                            <span class="bg-cyan-500/20 text-cyan-400 text-[9px] px-2 py-1 rounded-md font-black uppercase">JUE ${fmtDate}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="text-center border-r border-zinc-800">
                                <p class="text-[8px] text-zinc-500 uppercase font-black mb-1">A DEPOSITAR BANCO</p>
                                <p class="text-2xl font-black ${aCobrar >= 0 ? 'text-white' : 'text-red-500'}">$${Math.round(aCobrar).toLocaleString()}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-[8px] text-zinc-500 uppercase font-black mb-1">ADELANTOS RETENIDOS</p>
                                <p class="text-xl font-black text-yellow-500 mt-1">$${Math.round(totCash).toLocaleString()}</p>
                            </div>
                        </div>
                    </div>`;
                } else {
                    list.innerHTML += `
                    <div class="card bg-zinc-950/40 border-zinc-900">
                        <div class="flex justify-between items-center">
                            <div><p class="text-[9px] text-zinc-500 font-black uppercase mb-1">JUEVES ${fmtDate}</p><p class="text-lg font-black ${aCobrar >= 0 ? 'text-cyan-400' : 'text-red-500'}">$${Math.round(aCobrar).toLocaleString()}</p></div>
                            <div class="text-right"><p class="text-[8px] text-zinc-600 font-black uppercase">App: $${Math.round(totEarn)}</p><p class="text-[8px] text-yellow-600 font-black uppercase">Efe: -$${Math.round(totCash)}</p></div>
                        </div>
                    </div>`;
                }
            });
        };

        // TAB METAS Y BALANCES
        window.toggleGoalForm = () => {
            const form = document.getElementById('goal-form'); form.classList.toggle('hidden');
            if(!form.classList.contains('hidden')) {
                const meta = window.metas[`${new Date().getFullYear()}-${new Date().getMonth()}`] || { name: '', amount: '' };
                document.getElementById('goal-name-input').value = meta.name; document.getElementById('goal-amount-input').value = meta.amount;
            }
        };

        window.renderGoalWidget = () => {
            const now = new Date(); const key = `${now.getFullYear()}-${now.getMonth()}`;
            const meta = window.metas[key] || { name: 'OBJETIVO MENSUAL', amount: 0 };
            
            const currentNet = window.records.filter(r => r.year === now.getFullYear() && r.month === now.getMonth()).reduce((s, r) => s + (r.base + r.online + r.logros + r.grupo + r.propinasMano - r.gas), 0);
            const percent = meta.amount > 0 ? (currentNet / meta.amount) * 100 : 0;

            document.getElementById('goal-title').innerText = meta.name.toUpperCase();
            document.getElementById('goal-target').innerText = meta.amount > 0 ? `$${meta.amount.toLocaleString()}` : "Sin meta";
            document.getElementById('goal-current').innerText = `$${Math.round(currentNet).toLocaleString()}`;
            document.getElementById('goal-percentage').innerText = `${Math.round(percent)}%`;

            const circle = document.getElementById('goal-circle');
            const circumference = 251.2; 
            setTimeout(() => { circle.style.strokeDashoffset = circumference - (Math.min(percent, 100) / 100) * circumference; }, 100);

            if (percent >= 100 && meta.amount > 0) { circle.style.stroke = '#39ff14'; document.getElementById('goal-percentage').classList.add('text-green-400'); } 
            else { circle.style.stroke = '#00f3ff'; document.getElementById('goal-percentage').classList.remove('text-green-400'); }
        };

        window.renderBalances = () => {
            const balList = document.getElementById('balances-list'); balList.innerHTML = '';
            const m = {}; window.records.forEach(r => { const k = `${r.year}-${r.month}`; if(!m[k]) m[k] = []; m[k].push(r); });
            Object.keys(m).sort().reverse().forEach(k => {
                const data = m[k]; const tNet = data.reduce((s, r) => s + (r.base + r.online + r.logros + r.grupo + r.propinasMano - r.gas), 0);
                let wkH = ''; const w = {}; data.forEach(r => { if(!w[r.week]) w[r.week] = 0; w[r.week] += (r.base + r.online + r.logros + r.grupo + r.propinasMano - r.gas); });
                Object.keys(w).sort().reverse().forEach(wk => { wkH += `<div class="flex justify-between py-3 border-b border-white/5 text-[10px]"><span>Semana ${wk}</span><span class="text-cyan-400 font-bold">$${Math.round(w[wk]).toLocaleString()}</span></div>`; });
                const mesNom = new Date(data[0].date + 'T12:00:00').toLocaleString('es', {month:'long', year:'numeric'}).toUpperCase();
                balList.innerHTML += `<div class="card" onclick="this.querySelector('.weeks').classList.toggle('hidden')"><div class="flex justify-between items-center"><b>${mesNom}</b><b class="text-green-400">$${Math.round(tNet).toLocaleString()}</b></div><div class="weeks hidden mt-4 border-t border-white/5 pt-2">${wkH}</div></div>`;
            });
        };

        window.exportExcel = () => {
            if(!window.records.length) return alert("No hay datos");
            const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            const exData = window.records.map(r => {
                const tApp = r.base + r.logros + r.grupo + r.online;
                return { 'Día': dias[new Date(r.date + 'T12:00:00').getDay()], 'Fecha': r.date, 'Base': r.base, 'Logros': r.logros, 'Bono Grupo': r.grupo, 'Propinas App': r.online, 'Propinas Mano': r.propinasMano, 'Total App Bruto': tApp, 'Adelantos Efectivo': r.collected, 'A Cobrar Banco (Aprox)': tApp - r.collected, 'Gasto Nafta': r.gas, 'Ganancia Neta (Limpia)': (tApp + r.propinasMano) - r.gas, 'Paga Ganancias (Jueves)': r.peyaEarn, 'Descuenta Efectivo (Jueves)': r.peyaCash };
            });
            const ws = XLSX.utils.json_to_sheet(exData); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Contabilidad");
            XLSX.writeFile(wb, `Control_Rider_${Date.now()}.xlsx`);
        };

        window.onload = () => document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
