<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Financiero</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    
    <!-- UI & Tools -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --n-cyan: #00f3ff; --n-green: #39ff14; --n-red: #ff3131; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; touch-action: pan-y; }
        .card { background: rgba(18, 18, 18, 0.98); border-radius: 24px; padding: 1.5rem; border: 1px solid #222; }
        input { background: #111 !important; border: 1px solid #2a2a2a !important; color: var(--n-cyan) !important; text-align: center; height: 55px; border-radius: 16px; width: 100%; font-weight: 700; font-size: 1.1rem; outline: none; }
        .btn-main { font-weight: 900; display: flex; align-items: center; justify-content: center; text-transform: uppercase; border-radius: 18px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }
        .tab-btn { padding: 16px 0; font-weight: 900; font-size: 11px; text-transform: uppercase; color: #444; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--n-cyan); border-bottom: 2px solid var(--n-cyan); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col bg-black">

    <!-- PANTALLA CARGA -->
    <div id="view-loading" class="flex-1 flex flex-col items-center justify-center p-10 text-center">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Cargando Sistema...</p>
    </div>

    <!-- VISTA LOGIN -->
    <div id="view-login" class="hidden flex-1 flex flex-col items-center justify-center px-10 text-center">
        <div class="mb-14">
            <h1 class="font-black text-3xl uppercase tracking-tighter italic">CONTROL FINANCIERO</h1>
            <p class="text-zinc-600 text-[9px] font-black uppercase tracking-[0.3em] mt-2">Acceso Exclusivo</p>
        </div>
        <button onclick="handleLogin()" id="btn-login-google" class="w-full h-16 btn-main bg-white text-black gap-3 shadow-2xl">
            Entrar con Google
        </button>
    </div>

    <!-- VISTA APP -->
    <div id="view-app" class="hidden flex-1 flex flex-col">
        <header class="sticky top-0 bg-black/95 backdrop-blur-xl z-50 pt-8 pb-2 px-6 border-b border-zinc-900">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 id="display-user" class="font-black text-sm uppercase text-white italic">Rider</h2>
                    <p id="mundial-countdown" class="text-[9px] text-cyan-400 font-black uppercase tracking-wider mt-1 italic"></p>
                </div>
                <button onclick="handleLogout()" class="text-[9px] font-black text-zinc-500 uppercase border border-zinc-800 px-4 py-2 rounded-xl">Salir</button>
            </div>
            <nav class="flex">
                <button onclick="changeTab('registro')" id="btn-registro" class="tab-btn flex-1 active">Registro</button>
                <button onclick="changeTab('historial')" id="btn-historial" class="tab-btn flex-1">Historial</button>
                <button onclick="changeTab('balances')" id="btn-balances" class="tab-btn flex-1">Balances</button>
            </nav>
        </header>

        <main class="flex-1 pb-44 overflow-x-hidden">
            <div id="tab-registro" class="p-6 space-y-6">
                <div id="edit-indicator" class="hidden bg-yellow-500/10 border border-yellow-500/30 p-3 rounded-xl text-center">
                    <p class="text-[10px] font-black text-yellow-500 uppercase italic">Modo Edición</p>
                    <button onclick="cancelEdit()" class="text-[9px] text-white underline font-bold">Cancelar</button>
                </div>
                <div class="card"><input type="date" id="form-date"></div>
                
                <div class="card border-cyan-900/30">
                    <p class="text-[10px] font-black text-cyan-400 uppercase mb-4 text-center tracking-widest italic">Liquidación App</p>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div><label class="text-[8px] text-zinc-600 block mb-1 uppercase font-bold text-center">Base</label><input type="number" inputmode="decimal" id="form-base"></div>
                        <div><label class="text-[8px] text-zinc-600 block mb-1 uppercase font-bold text-center">Propinas App</label><input type="number" inputmode="decimal" id="form-online"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[8px] text-zinc-600 block mb-1 uppercase font-bold text-center">Logros</label><input type="number" inputmode="decimal" id="form-logros"></div>
                        <div><label class="text-[8px] text-zinc-600 block mb-1 uppercase font-bold text-center">Grupo</label><input type="number" inputmode="decimal" id="form-grupo"></div>
                    </div>
                </div>

                <div class="card border-yellow-900/30">
                    <p class="text-[10px] font-black text-yellow-500 uppercase mb-2 text-center">Adelantos en Efectivo</p>
                    <input type="number" inputmode="decimal" id="form-collected" class="!text-yellow-500" placeholder="Dinero rendido">
                </div>

                <div class="card border-green-900/30 bg-green-500/[0.02]">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-green-500 uppercase">Propinas Mano</span>
                        <span id="display-tip-total" class="text-3xl font-black text-green-400">$0</span>
                    </div>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <button onclick="addTip(200)" class="h-12 rounded-xl bg-zinc-900 text-green-400 border border-zinc-800 text-[10px] font-black">+$200</button>
                        <button onclick="addTip(500)" class="h-12 rounded-xl bg-zinc-900 text-green-400 border border-zinc-800 text-[10px] font-black">+$500</button>
                        <button onclick="addTip(1000)" class="h-12 rounded-xl bg-zinc-900 text-green-400 border border-zinc-800 text-[10px] font-black">+$1k</button>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <input type="number" inputmode="decimal" id="form-tip-manual" placeholder="Monto" class="flex-1 !text-left px-4 !text-green-400 h-[45px]">
                        <button onclick="addManualTip()" class="bg-green-600 text-black px-6 rounded-xl font-black text-[10px] uppercase">Sumar</button>
                    </div>
                    <div id="tips-log" class="max-h-32 overflow-y-auto space-y-1"></div>
                </div>

                <div class="card border-red-900/30">
                    <p class="text-[10px] font-black text-red-500 uppercase mb-2 text-center">Gasto Nafta</p>
                    <input type="number" inputmode="decimal" id="form-gas" class="!text-red-500">
                </div>
            </div>

            <div id="tab-historial" class="p-6 hidden space-y-4">
                <div id="weekly-cut" class="space-y-4"></div>
                <div id="history-list" class="space-y-4 pb-10"></div>
            </div>

            <div id="tab-balances" class="p-6 hidden space-y-4"></div>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-6 bg-black/95 backdrop-blur-2xl border-t border-zinc-900 max-w-md mx-auto z-40 flex gap-4">
            <button onclick="saveRecord()" id="btn-save" class="flex-[3] h-16 btn-main bg-white text-black text-[11px] font-black shadow-[0_0_20px_rgba(255,255,255,0.1)]">Guardar Jornada</button>
            <button onclick="exportExcel()" class="flex-[2] h-16 btn-main border border-green-500 text-green-500 text-[9px] text-center leading-tight">Exportar a<br>Excel</button>
        </div>
    </div>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyDGUD-PIo2zFBkiFqfkN0Fpaqqp5_jNInw",
            authDomain: "control-financiero-rider.firebaseapp.com",
            projectId: "control-financiero-rider",
            storageBucket: "control-financiero-rider.firebasestorage.app",
            messagingSenderId: "952661224242",
            appId: "1:952661224242:web:3640495af6d4719c33052b"
        };
        
        firebase.initializeApp(fbConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const APP_ID = 'control-rider-eze';
        
        // Forzamos persistencia local para evitar cierres de sesión
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

        let user = null, records = [], dailyTips = [], editingId = null, currentTab = 'registro';

        // SWIPE GESTURES
        let touchstartX = 0;
        window.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
        window.addEventListener('touchend', e => { 
            const diff = touchstartX - e.changedTouches[0].screenX;
            const tabs = ['registro', 'historial', 'balances'];
            const idx = tabs.indexOf(currentTab);
            if (Math.abs(diff) > 80) {
                if (diff > 0 && idx < 2) changeTab(tabs[idx+1]);
                if (diff < 0 && idx > 0) changeTab(tabs[idx-1]);
            }
        });

        // LOGIN LOGIC
        async function handleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Usamos signInWithRedirect para evitar bloqueos en celulares
            try {
                await auth.signInWithRedirect(provider);
            } catch (err) {
                alert("Error al iniciar Google. Intentá de nuevo.");
            }
        }

        // Esta función atrapa el resultado después de que Google te devuelve a la app
        auth.getRedirectResult().then((result) => {
            if (result.user) {
                console.log("Login exitoso tras redirect");
            }
        }).catch((error) => {
            console.error("Error redirect result:", error);
        });

        // ESCUCHA DE SESION
        auth.onAuthStateChanged(u => {
            user = u;
            document.getElementById('view-loading').classList.add('hidden');
            if (u) {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('display-user').innerText = "Hola, " + u.displayName.split(' ')[0];
                updateCountdown();
                fetchData();
            } else {
                document.getElementById('view-login').classList.remove('hidden');
                document.getElementById('view-app').classList.add('hidden');
            }
        });

        function handleLogout() {
            if(confirm("¿Cerrar sesión?")) {
                auth.signOut().then(() => {
                    localStorage.clear();
                    location.reload();
                }).catch(() => location.reload());
            }
        }

        // --- SISTEMA ---
        async function fetchData() {
            if(!user) return;
            const snap = await db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('jornadas').orderBy('date', 'desc').get();
            records = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderHistory(); renderBalances();
        }

        function updateCountdown() {
            const m = new Date('2026-06-11T00:00:00');
            const d = Math.ceil((m - new Date()) / 864e5);
            const el = document.getElementById('mundial-countdown');
            if(el) el.innerText = `Faltan ${d} dias para el mundial 🇦🇷`;
        }

        function addTip(v) { dailyTips.push({id: Date.now(), amount: v, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}); updateTipUI(); }
        function addManualTip() { const el = document.getElementById('form-tip-manual'); const v = parseFloat(el.value); if(v > 0) { addTip(v); el.value = ''; } }
        function updateTipUI() {
            const total = dailyTips.reduce((s, c) => s + c.amount, 0);
            document.getElementById('display-tip-total').innerText = `$${total.toLocaleString()}`;
            const list = document.getElementById('tips-log'); list.innerHTML = '';
            [...dailyTips].reverse().forEach(t => {
                list.innerHTML += `<div class="flex justify-between text-[10px] p-2 bg-white/5 rounded-lg mb-1"><span>${t.time} — <b>$${t.amount}</b></span><button onclick="removeTip(${t.id})" class="text-red-500 font-black">X</button></div>`;
            });
        }
        function removeTip(id) { dailyTips = dailyTips.filter(t => t.id !== id); updateTipUI(); }

        async function saveRecord() {
            const date = document.getElementById('form-date').value;
            if(!date) return alert("Elegí una fecha");
            const btn = document.getElementById('btn-save');
            btn.disabled = true; btn.innerText = "Guardando...";
            const d = new Date(date + 'T12:00:00');
            const data = {
                date, month: d.getMonth(), year: d.getFullYear(), week: getWeekNumber(d),
                base: parseFloat(document.getElementById('form-base').value) || 0,
                online: parseFloat(document.getElementById('form-online').value) || 0,
                logros: parseFloat(document.getElementById('form-logros').value) || 0,
                grupo: parseFloat(document.getElementById('form-grupo').value) || 0,
                collected: parseFloat(document.getElementById('form-collected').value) || 0,
                gas: parseFloat(document.getElementById('form-gas').value) || 0,
                propinasMano: dailyTips.reduce((s, c) => s + c.amount, 0),
                tipsDetail: dailyTips,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            const ref = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('jornadas');
            try {
                if(editingId) await ref.doc(editingId).update(data); else await ref.add(data);
                cancelEdit(); fetchData();
            } catch (e) { alert("Error al guardar"); }
            btn.disabled = false; btn.innerText = editingId ? "Actualizar Jornada" : "Guardar Jornada";
        }

        function editRecord(id) {
            const r = records.find(x => x.id === id); if(!r) return;
            editingId = id; document.getElementById('form-date').value = r.date;
            ['base','online','logros','grupo','collected','gas'].forEach(k => document.getElementById('form-'+k).value = r[k]);
            dailyTips = r.tipsDetail || []; updateTipUI();
            document.getElementById('edit-indicator').classList.remove('hidden');
            document.getElementById('btn-save').innerText = "Actualizar Jornada";
            changeTab('registro');
        }

        async function deleteRecord(id) { if(confirm("¿Borrar jornada?")) { await db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('jornadas').doc(id).delete(); fetchData(); } }
        function cancelEdit() { editingId = null; ['base','online','logros','grupo','collected','gas'].forEach(k => document.getElementById('form-'+k).value = ''); dailyTips = []; updateTipUI(); document.getElementById('edit-indicator').classList.add('hidden'); document.getElementById('btn-save').innerText = "Guardar Jornada"; }
        function changeTab(t) { currentTab = t; ['registro','historial','balances'].forEach(v => { document.getElementById('tab-'+v).classList.add('hidden'); document.getElementById('btn-'+v).classList.remove('active'); }); document.getElementById('tab-'+t).classList.remove('hidden'); document.getElementById('btn-'+t).classList.add('active'); window.scrollTo(0,0); }
        function getWeekNumber(d) { d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7)); return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 864e5) + 1) / 7); }

        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            const cut = document.getElementById('weekly-cut'); cut.innerHTML = '';
            const now = new Date(); const curW = getWeekNumber(now); const curY = now.getFullYear();
            const weekRecs = records.filter(r => r.week === curW && r.year === curY);
            const totApp = weekRecs.reduce((s, r) => s + r.base + r.online + r.logros + r.grupo, 0);
            const totAde = weekRecs.reduce((s, r) => s + r.collected, 0);
            const aCobrar = totApp - totAde;

            cut.innerHTML = `
                <div class="card border border-cyan-500/20 bg-cyan-500/[0.04] mb-2">
                    <div class="flex justify-between items-center mb-4"><span class="text-[9px] font-black text-cyan-400 uppercase italic">Semana ${curW}</span><span class="bg-cyan-500/10 text-cyan-400 text-[7px] px-2 py-1 rounded-lg font-black uppercase">Corte</span></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center border-r border-zinc-900"><p class="text-[7px] text-zinc-500 uppercase font-black mb-1 italic">Banco</p><p class="text-xl font-black text-white">$${Math.round(aCobrar).toLocaleString()}</p></div>
                        <div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black mb-1 italic">Adelantos</p><p class="text-xl font-black text-yellow-500">$${Math.round(totAde).toLocaleString()}</p></div>
                    </div>
                </div>
                <p class="text-center text-[8px] font-black uppercase text-zinc-700 tracking-widest py-2">Lista de Jornadas</p>`;

            const ds = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            records.forEach(r => {
                const appT = r.base + r.online + r.logros + r.grupo;
                const netD = appT + r.propinasMano - r.gas;
                const nomD = ds[new Date(r.date + 'T12:00:00').getDay()];
                list.innerHTML += `
                    <div class="card border-l-4 border-cyan-500 mb-3 bg-zinc-950/40">
                        <div class="flex justify-between items-start">
                            <div><p class="text-[8px] text-zinc-600 font-black uppercase">${nomD} ${r.date.split('-').reverse().slice(0,2).join('/')}</p><p class="text-xl font-black">$${Math.round(netD).toLocaleString()} <span class="text-[9px] text-zinc-700 italic">NETO</span></p></div>
                            <div class="flex gap-2">
                                <button onclick="editRecord('${r.id}')" class="bg-zinc-900 px-3 py-2 rounded-xl text-cyan-400 text-[9px] font-black uppercase">Edit</button>
                                <button onclick="deleteRecord('${r.id}')" class="bg-zinc-900 px-3 py-2 rounded-xl text-red-500 text-[9px] font-black uppercase">X</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function renderBalances() {
            const bal = document.getElementById('tab-balances'); 
            bal.innerHTML = '<h3 class="text-center text-[10px] font-black uppercase mb-6 italic text-zinc-600 tracking-widest">Balances</h3>';
            const m = {}; records.forEach(r => { const k = `${r.year}-${r.month}`; if(!m[k]) m[k] = []; m[k].push(r); });
            Object.keys(m).sort().reverse().forEach(k => {
                const data = m[k]; const tNet = data.reduce((s, r) => s + (r.base + r.online + r.logros + r.grupo + r.propinasMano - r.gas), 0);
                let wkH = ''; const w = {}; data.forEach(r => { if(!w[r.week]) w[r.week] = 0; w[r.week] += (r.base + r.online + r.logros + r.grupo + r.propinasMano - r.gas); });
                Object.keys(w).sort().reverse().forEach(wk => wkH += `<div class="flex justify-between py-3 border-b border-white/5 text-[10px]"><span>Semana ${wk}</span><span class="text-cyan-400 font-bold">$${Math.round(w[wk]).toLocaleString()}</span></div>`);
                const mesNom = new Date(data[0].date + 'T12:00:00').toLocaleString('es', {month:'long', year:'numeric'}).toUpperCase();
                bal.innerHTML += `<div class="card" onclick="this.querySelector('.weeks').classList.toggle('hidden')"><div class="flex justify-between items-center"><b>${mesNom}</b><b class="text-green-400">$${Math.round(tNet).toLocaleString()}</b></div><div class="weeks hidden mt-4 border-t border-white/5 pt-2">${wkH}</div></div>`;
            });
        }

        function exportExcel() {
            if(!records.length) return alert("Sin datos");
            const ds = ["Dom", "Lun", "Mar", "Mie", "Jue", "Vie", "Sab"];
            const exData = records.map(r => ({ Día: ds[new Date(r.date + 'T12:00:00').getDay()], Fecha: r.date, Base: r.base, Logros: r.logros, Grupo: r.grupo, Propina_App: r.online, Propina_Mano: r.propinasMano, Adelantos: r.collected, Nafta: r.gas, Neto: (r.base + r.online + r.logros + r.grupo + r.propinasMano) - r.gas }));
            const ws = XLSX.utils.json_to_sheet(exData); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Datos");
            XLSX.writeFile(wb, `Planilla_Rider_${Date.now()}.xlsx`);
        }
        window.onload = () => document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
