<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rider Finance Pro | Cloud</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --n-cyan: #00f3ff; --n-green: #39ff14; --n-red: #ff3131; --n-yellow: #f3ff00; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .card { background: rgba(18, 18, 18, 0.98); border-radius: 24px; padding: 1.5rem; border: 1px solid #222; }
        input { background: #111 !important; border: 1px solid #2a2a2a !important; color: var(--n-cyan) !important; text-align: center; height: 60px; border-radius: 16px; width: 100%; font-weight: 700; font-size: 1.1rem; outline: none; }
        input:focus { border-color: var(--n-cyan) !important; }
        .btn-main { height: 65px; font-weight: 900; display: flex; align-items: center; justify-content: center; text-transform: uppercase; border-radius: 18px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }
        .tab-btn { padding: 16px 0; font-weight: 900; font-size: 11px; text-transform: uppercase; color: #444; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--n-cyan); border-bottom: 2px solid var(--n-cyan); }
        .tip-item { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 14px; padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col bg-black">

    <div id="view-login" class="flex-1 flex flex-col items-center justify-center px-10 text-center">
        <div class="mb-14">
            <h1 class="font-black text-3xl uppercase tracking-tighter italic">RIDER CONTROL</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.5em] font-black mt-3">Finanzas Pedidos Ya</p>
        </div>
        <button onclick="handleLogin()" class="w-full btn-main bg-white text-black gap-3 shadow-2xl">
            <svg class="w-6 h-6" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Entrar con Google
        </button>
    </div>

    <div id="view-app" class="hidden flex-1 flex flex-col">
        <header class="sticky top-0 bg-black/95 backdrop-blur-xl z-50 pt-8 pb-2 px-6 border-b border-zinc-900">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 id="display-user" class="font-black text-sm uppercase">Usuario</h2>
                    <p class="text-[9px] text-zinc-600 font-black uppercase tracking-widest">Nube Conectada</p>
                </div>
                <button onclick="handleLogout()" class="text-[9px] font-black text-zinc-500 uppercase border border-zinc-800 px-4 py-2 rounded-xl">Salir</button>
            </div>
            <nav class="flex">
                <button onclick="changeTab('registro')" id="btn-registro" class="tab-btn flex-1 active">Registro</button>
                <button onclick="changeTab('historial')" id="btn-historial" class="tab-btn flex-1">Historial</button>
                <button onclick="changeTab('balances')" id="btn-balances" class="tab-btn flex-1">Balances</button>
            </nav>
        </header>

        <main class="flex-1 pb-40">
            <div id="tab-registro" class="p-6 space-y-6">
                <div class="card">
                    <label class="block text-[10px] font-black uppercase text-zinc-600 mb-3 text-center">Fecha de la Jornada</label>
                    <input type="date" id="form-date">
                </div>
                <div class="card border-cyan-900/30">
                    <p class="text-[10px] font-black text-cyan-400 uppercase mb-5 text-center tracking-widest">Liquidación App</p>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="text-[8px] text-zinc-500 block mb-1 ml-1 uppercase">Pago Base</label><input type="number" inputmode="decimal" id="form-base" placeholder="0"></div>
                        <div><label class="text-[8px] text-zinc-500 block mb-1 ml-1 uppercase">Propina App</label><input type="number" inputmode="decimal" id="form-online" placeholder="0"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[8px] text-zinc-500 block mb-1 ml-1 uppercase">Logros</label><input type="number" inputmode="decimal" id="form-logros" placeholder="0"></div>
                        <div><label class="text-[8px] text-zinc-500 block mb-1 ml-1 uppercase">Grupo</label><input type="number" inputmode="decimal" id="form-grupo" placeholder="0"></div>
                    </div>
                </div>
                <div class="card border-yellow-900/30">
                    <p class="text-[10px] font-black text-yellow-500 uppercase mb-3 text-center">Efectivo Cobrado (Pedidos)</p>
                    <input type="number" inputmode="decimal" id="form-collected" placeholder="Dinero a rendir" class="!text-yellow-500">
                </div>
                <div class="card border-green-900/30 bg-green-500/[0.02]">
                    <div class="flex justify-between items-center mb-5"><span class="text-[10px] font-black text-green-500 uppercase">Propinas Efectivo</span><span id="display-tip-total" class="text-3xl font-black text-green-400">$0</span></div>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <button onclick="addQuickTip(200)" class="h-14 rounded-2xl bg-zinc-900 text-green-400 border border-zinc-800 text-xs font-black">+$200</button>
                        <button onclick="addQuickTip(500)" class="h-14 rounded-2xl bg-zinc-900 text-green-400 border border-zinc-800 text-xs font-black">+$500</button>
                        <button onclick="addQuickTip(1000)" class="h-14 rounded-2xl bg-zinc-900 text-green-400 border border-zinc-800 text-xs font-black">+$1k</button>
                    </div>
                    <div class="flex gap-2 mb-4">
                        <input type="number" inputmode="decimal" id="form-tip-manual" placeholder="Monto manual" class="flex-1 !text-left px-4 !text-green-400">
                        <button onclick="addManualTip()" class="bg-green-600 text-black px-6 rounded-xl font-black text-[10px] uppercase">Sumar</button>
                    </div>
                    <div id="tips-log" class="max-h-56 overflow-y-auto space-y-2 border-t border-zinc-900 pt-5"></div>
                </div>
                <div class="card border-red-900/30">
                    <p class="text-[10px] font-black text-red-500 uppercase mb-3 text-center">Gasto Nafta</p>
                    <input type="number" inputmode="decimal" id="form-gas" placeholder="0" class="!text-red-500">
                </div>
                <button onclick="saveRecord()" id="btn-save" class="w-full btn-main bg-white text-black shadow-2xl h-[80px] text-xl">GUARDAR JORNADA</button>
            </div>
            <div id="tab-historial" class="p-6 hidden space-y-4"></div>
            <div id="tab-balances" class="p-6 hidden space-y-6"></div>
        </main>

        <div id="action-bar" class="fixed bottom-0 left-0 right-0 p-6 bg-black/95 backdrop-blur-2xl border-t border-zinc-900 max-w-md mx-auto z-40 flex gap-4">
            <button onclick="exportExcel()" class="flex-[3] h-14 rounded-2xl bg-green-600 text-[10px] font-black uppercase tracking-widest">Excel</button>
            <button onclick="clearCloud()" class="flex-1 h-14 rounded-2xl border border-red-900/30 text-[10px] font-black text-red-500 uppercase">Borrar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGUD-PIo2zFBkiFqfkN0Fpaqqp5_jNInw",
            authDomain: "control-financiero-rider.firebaseapp.com",
            projectId: "control-financiero-rider",
            storageBucket: "control-financiero-rider.firebasestorage.app",
            messagingSenderId: "952661224242",
            appId: "1:952661224242:web:3640495af6d4719c33052b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore(); const APP_ID = 'control-rider-eze';
        let user = null; let records = []; let dailyTips = JSON.parse(localStorage.getItem('rider_v2_propinas')) || [];

        auth.onAuthStateChanged(u => {
            user = u;
            if (u) {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-app').classList.remove('hidden');
                document.getElementById('display-user').innerText = "Hola, " + u.displayName.split(' ')[0];
                fetchData();
            } else {
                document.getElementById('view-login').classList.remove('hidden');
                document.getElementById('view-app').classList.add('hidden');
            }
        });

        function handleLogin() { const provider = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(provider); }
        function handleLogout() { if(confirm("¿Cerrar sesión?")) auth.signOut(); }
        function addQuickTip(v) { registerTip(v); }
        function addManualTip() { const el = document.getElementById('form-tip-manual'); const v = parseFloat(el.value) || 0; if(v > 0) { registerTip(v); el.value = ''; el.focus(); } }
        function registerTip(amt) { dailyTips.push({ id: Date.now(), amount: amt, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }); updateTipUI(); }
        function updateTipUI() {
            localStorage.setItem('rider_v2_propinas', JSON.stringify(dailyTips));
            const total = dailyTips.reduce((s, c) => s + c.amount, 0);
            document.getElementById('display-tip-total').innerText = `$${total.toLocaleString()}`;
            const list = document.getElementById('tips-log'); list.innerHTML = '';
            [...dailyTips].reverse().forEach(t => {
                const div = document.createElement('div'); div.className = "tip-item";
                div.innerHTML = `<span class="text-[10px] font-bold text-zinc-500">${t.time} — <b class="text-green-400">$${t.amount}</b></span><button onclick="removeTip(${t.id})" class="text-[10px] text-red-500 font-black">✕</button>`;
                list.appendChild(div);
            });
        }
        function removeTip(id) { dailyTips = dailyTips.filter(t => t.id !== id); updateTipUI(); }
        async function fetchData() {
            if(!user) return;
            const ref = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('jornadas');
            const snap = await ref.orderBy('date', 'desc').get();
            records = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderHistory(); renderBalances();
        }
        async function saveRecord() {
            const date = document.getElementById('form-date').value;
            if(!date) return alert("Elegí una fecha");
            const btn = document.getElementById('btn-save'); btn.disabled = true; btn.innerText = "SINCRO...";
            const d = new Date(date + 'T12:00:00');
            const data = {
                date, month: d.getMonth(), year: d.getFullYear(), week: getWeekNumber(d),
                base: parseFloat(document.getElementById('form-base').value) || 0,
                online: parseFloat(document.getElementById('form-online').value) || 0,
                logros: parseFloat(document.getElementById('form-logros').value) || 0,
                grupo: parseFloat(document.getElementById('form-grupo').value) || 0,
                collected: parseFloat(document.getElementById('form-collected').value) || 0,
                gas: parseFloat(document.getElementById('form-gas').value) || 0,
                propinasMano: dailyTips.reduce((s, c) => s + c.amount, 0),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                const ref = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('jornadas');
                await ref.add(data);
                ['form-base','form-online','form-logros','form-grupo','form-collected','form-gas'].forEach(k => document.getElementById(k).value = '');
                dailyTips = []; updateTipUI(); fetchData(); alert("Jornada guardada correctamente.");
            } catch (e) { alert("Error al guardar"); }
            finally { btn.disabled = false; btn.innerText = "GUARDAR JORNADA"; }
        }
        function changeTab(t) {
            ['registro','historial','balances'].forEach(v => { document.getElementById('tab-'+v).classList.add('hidden'); document.getElementById('btn-'+v).classList.remove('active'); });
            document.getElementById('tab-'+t).classList.remove('hidden'); document.getElementById('btn-'+t).classList.add('active'); window.scrollTo(0,0);
        }
        function renderHistory() {
            const cont = document.getElementById('tab-historial');
            cont.innerHTML = '<h3 class="text-[10px] uppercase my-6 text-center text-zinc-700 font-black italic">Resumen Diario</h3>';
            records.forEach(r => {
                const tApp = r.base + r.online + r.logros + r.grupo; const dep = tApp - r.collected;
                // --- CÁLCULO NETO LIMPIO (SIN EL 10%) ---
                const net = (tApp + r.propinasMano) - r.gas;
                cont.innerHTML += `<div class="card border-l-4 border-cyan-500 flex justify-between items-center mb-4 bg-zinc-950/40"><div><p class="text-[8px] text-zinc-600 font-black">${r.date}</p><p class="text-2xl font-black text-white">$${Math.round(net).toLocaleString()} <span class="text-[9px] text-zinc-700 font-black">NETO</span></p><p class="text-[9px] font-bold ${dep >= 0 ? 'text-cyan-500' : 'text-orange-500'}">🏦 Depósito: $${Math.round(dep).toLocaleString()}</p></div><div class="text-right text-green-500 font-black">Propinas: $${r.propinasMano}</div></div>`;
            });
        }
        function renderBalances() {
            const cont = document.getElementById('tab-balances');
            cont.innerHTML = '<h3 class="text-[10px] uppercase my-6 text-center text-zinc-700 font-black italic">Balances Mensuales</h3>';
            const m = {}; records.forEach(r => { const k = `${r.year}-${r.month}`; if(!m[k]) m[k] = []; m[k].push(r); });
            Object.keys(m).sort().reverse().forEach(k => {
                const mData = m[k]; const d = new Date(mData[0].date + 'T12:00:00');
                const tApp = mData.reduce((s, c) => s + c.base + c.logros + c.grupo, 0);
                const tPropinasOn = mData.reduce((s, c) => s + c.online, 0);
                const tPropinasMano = mData.reduce((s, c) => s + c.propinasMano, 0);
                cont.innerHTML += `<div class="card mb-8"><p class="text-[11px] font-black text-cyan-400 uppercase tracking-widest mb-5 border-b border-zinc-900 pb-3">${d.toLocaleString('es',{month:'long',year:'numeric'}).toUpperCase()}</p><div class="grid grid-cols-2 gap-4 mb-4"><div class="bg-zinc-900/50 p-4 rounded-3xl text-center"><p class="text-[8px] text-zinc-600 font-black uppercase">Liquidación App</p><p class="text-lg font-black text-white">$${Math.round(tApp).toLocaleString()}</p></div><div class="bg-zinc-900/50 p-4 rounded-3xl text-center"><p class="text-[8px] text-zinc-600 font-black uppercase">Propinas Online</p><p class="text-lg font-black text-green-400">$${Math.round(tPropinasOn).toLocaleString()}</p></div></div><div class="bg-green-500/5 p-4 rounded-3xl border border-green-500/10 text-center"><p class="text-[8px] text-green-700 font-black uppercase">Total Propinas en Mano</p><p class="text-xl font-black text-green-400">$${Math.round(tPropinasMano).toLocaleString()}</p></div></div>`;
            });
        }
        function getWeekNumber(d) { d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7)); return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7); }
        function exportExcel() { if(records.length === 0) return alert("Sin datos"); const wb = XLSX.utils.book_new(); const ws = XLSX.utils.json_to_sheet(records); XLSX.utils.book_append_sheet(wb, ws, "Historial"); XLSX.writeFile(wb, `Planilla_Rider_${Date.now()}.xlsx`); }
        async function clearCloud() { if(confirm("¿Borrar historial?")) { const ref = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('jornadas'); const snap = await ref.get(); const batch = db.batch(); snap.forEach(doc => batch.delete(doc.ref)); await batch.commit(); fetchData(); } }
        window.onload = () => { document.getElementById('form-date').value = new Date().toISOString().split('T')[0]; updateTipUI(); };
    </script>
</body>
</html>
